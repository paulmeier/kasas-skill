name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install -r requirements-dev.txt
      - name: Check formatting
        run: |
          if ! ruff format --check scripts tools tests; then
            echo "::error::Python files are not formatted. Run 'make fmt'."
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check --output-format=github scripts tools tests

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate plugin + skills (deterministic gate)
        run: python tools/validate_plugin.py
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: claude plugin validate
        env:
          CI: "true"
        run: claude plugin validate .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run pipeline smoke tests
        run: python -m unittest discover -s tests -v
